server {
    listen 80;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This line is the "magic" that makes React Router work
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests to avoid CORS issues if needed
    # location /api {
    #    proxy_pass http://backend:5000;
    # }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}